<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MercadoHub</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background: #0f172a; 
            color: #fff; 
            padding: 20px;
        }
        .navbar { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 20px; 
            background: #1e293b; 
            border-radius: 8px;
            margin-bottom: 30px;
        }
        .brand { font-size: 24px; font-weight: bold; color: #3b82f6; }
        .btn { 
            padding: 8px 16px; 
            background: #3b82f6; 
            color: white; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            margin-left: 10px;
        }
        .btn:hover { background: #2563eb; }
        .container { max-width: 1200px; margin: 0 auto; }
        .hero { text-align: center; margin-bottom: 40px; }
        .hero h1 { font-size: 32px; margin-bottom: 10px; }
        .hero p { color: #94a3b8; }
        .apps { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .app-card { 
            background: #1e293b; 
            padding: 24px; 
            border-radius: 12px; 
            cursor: pointer;
            border: 1px solid #334155;
        }
        .app-card:hover { border-color: #3b82f6; }
        .app-card h3 { margin-bottom: 8px; }
        .app-card p { color: #94a3b8; font-size: 14px; margin-bottom: 12px; }
        .badge { 
            display: inline-block; 
            padding: 4px 8px; 
            background: #10b981; 
            color: white; 
            border-radius: 4px; 
            font-size: 12px;
        }
        .modal { 
            display: none; 
            position: fixed; 
            inset: 0; 
            background: rgba(0,0,0,0.8); 
            align-items: center; 
            justify-content: center;
            z-index: 1000;
        }
        .modal.active { display: flex; }
        .modal-content { 
            background: #1e293b; 
            padding: 32px; 
            border-radius: 12px; 
            width: 100%; 
            max-width: 400px;
        }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; margin-bottom: 6px; color: #94a3b8; }
        .form-group input { 
            width: 100%; 
            padding: 10px; 
            background: #0f172a; 
            border: 1px solid #334155; 
            border-radius: 6px; 
            color: white;
        }
        .toast { 
            position: fixed; 
            bottom: 20px; 
            right: 20px; 
            background: #1e293b; 
            padding: 12px 20px; 
            border-radius: 8px; 
            border: 1px solid #334155;
            display: none;
        }
        .toast.show { display: block; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="brand">MercadoHub</div>
        <div>
            <span id="userBadge" style="display:none; margin-right:10px; color:#94a3b8;"></span>
            <button class="btn" id="btnAuth" onclick="handleAuth()">Entrar</button>
            <button class="btn" onclick="handleUpgrade()">Upgrade</button>
        </div>
    </nav>

    <div class="container">
        <div class="hero">
            <h1>Tudo para o seu <span style="color:#3b82f6">varejo</span></h1>
            <p>Crie etiquetas profissionais de forma rápida e segura</p>
        </div>

        <div class="apps">
            <div class="app-card" onclick="openApp('etiquetas')">
                <h3>🏷️ Gerador de Etiquetas</h3>
                <p>Etiquetas profissionais com código de barras</p>
                <span class="badge">GRÁTIS (36/dia)</span>
                <div style="margin-top:12px; font-size:12px; color:#94a3b8;">
                    Usado: <b id="usageCount">0</b>/36
                </div>
            </div>
            
            <div class="app-card" style="opacity:0.6;">
                <h3>🔍 Pesquisa de Preços</h3>
                <p>Busque e compare preços</p>
                <span style="background:#64748b; padding:4px 8px; border-radius:4px; font-size:12px;">EM BREVE</span>
            </div>
        </div>
    </div>

    <!-- LOGIN MODAL -->
    <div class="modal" id="loginModal">
        <div class="modal-content">
            <h2 style="margin-bottom:20px;">Acessar conta</h2>
            <div class="form-group">
                <label>E-mail</label>
                <input type="email" id="email" placeholder="voce@email.com">
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" id="password" placeholder="••••••••">
            </div>
            <button class="btn" style="width:100%" onclick="executeAuth()">Entrar</button>
            <p style="margin-top:16px; text-align:center; color:#94a3b8; font-size:14px; cursor:pointer;" onclick="toggleMode()">
                <span id="toggleText">Não tem conta? Cadastre-se</span>
            </p>
            <button onclick="closeModal()" style="margin-top:10px; width:100%; padding:8px; background:transparent; border:1px solid #334155; color:#94a3b8; border-radius:6px; cursor:pointer;">Cancelar</button>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // CONFIGURAÇÃO SUPABASE
        const SUPABASE_URL = 'https://lueyjgwjvnmakylwqybi.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_LWk7NY-9b9g5bZ169LHOWg_vmvw1LAI';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUser = null;
        let isLoginMode = true;

        // INICIALIZAÇÃO
        async function init() {
            const { data } = await supabase.auth.getSession();
            if (data.session) {
                currentUser = data.session.user;
                updateUI();
            }
        }
        init();

        function handleAuth() {
            if (currentUser) {
                logout();
            } else {
                document.getElementById('loginModal').classList.add('active');
            }
        }

        function closeModal() {
            document.getElementById('loginModal').classList.remove('active');
        }

        function toggleMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('toggleText').textContent = isLoginMode ? 
                'Não tem conta? Cadastre-se' : 'Já tem conta? Entrar';
        }

        async function executeAuth() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (!email || !password) {
                showToast('Preencha e-mail e senha');
                return;
            }

            let result;
            if (isLoginMode) {
                result = await supabase.auth.signInWithPassword({ email, password });
            } else {
                result = await supabase.auth.signUp({ email, password });
            }

            if (result.error) {
                showToast('Erro: ' + result.error.message);
                return;
            }

            showToast(isLoginMode ? 'Bem-vindo!' : 'Conta criada!');
            currentUser = result.data.user;
            closeModal();
            updateUI();
        }

        async function logout() {
            await supabase.auth.signOut();
            currentUser = null;
            updateUI();
            showToast('Desconectado');
        }

        function updateUI() {
            const badge = document.getElementById('userBadge');
            const btn = document.getElementById('btnAuth');

            if (currentUser) {
                badge.style.display = 'inline';
                badge.textContent = '👤 ' + currentUser.email.split('@')[0];
                btn.textContent = 'Sair';
            } else {
                badge.style.display = 'none';
                btn.textContent = 'Entrar';
            }
        }

        function openApp(appName) {
            if (!currentUser) {
                showToast('Faça login primeiro');
                document.getElementById('loginModal').classList.add('active');
                return;
            }

            if (appName === 'etiquetas') {
                const count = parseInt(localStorage.getItem('labels_used') || '0');
                if (count >= 36) {
                    showToast('Limite diário atingido!');
                    return;
                }
                window.location.href = '/app/etiquetas.html';
            }
        }

        function handleUpgrade() {
            showToast('Em breve: Integração Mercado Pago');
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // Fechar modal ao clicar fora
        document.getElementById('loginModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });
    </script>
</body>
</html>
